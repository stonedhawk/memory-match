<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f23;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 60%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Difficulty selector */
    .difficulty-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .diff-btn {
      padding: 8px 22px;
      border-radius: 999px;
      border: 2px solid #2d2d5e;
      background: transparent;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .diff-btn:hover {
      border-color: #6366f1;
      color: #c7d2fe;
    }

    .diff-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    /* Board */
    .board-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .board {
      display: grid;
      gap: 12px;
    }

    /* Card */
    .card-outer {
      perspective: 800px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card-outer.flipped .card-inner,
    .card-outer.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Card back */
    .card-back {
      background: linear-gradient(135deg, #1e1e4a 0%, #2d2d5e 50%, #1a1a40 100%);
      border: 2px solid #3d3d7a;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .card-back-pattern {
      width: 70%;
      height: 70%;
      border-radius: 8px;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 4px,
        rgba(99, 102, 241, 0.15) 4px,
        rgba(99, 102, 241, 0.15) 8px
      );
      border: 1.5px solid rgba(99, 102, 241, 0.25);
    }

    /* Card front */
    .card-front {
      background: linear-gradient(135deg, #1a1a3e 0%, #252550 100%);
      border: 2px solid #3d3d7a;
      transform: rotateY(180deg);
      font-size: var(--emoji-size, 2rem);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .card-outer.matched .card-front {
      border-color: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.35), 0 4px 16px rgba(0,0,0,0.4);
    }

    /* Hover lift on unflipped, unmatched cards */
    .card-outer:not(.flipped):not(.matched):hover .card-inner {
      transform: translateY(-4px) scale(1.04);
    }

    .card-outer:not(.flipped):not(.matched):hover .card-back {
      border-color: #6366f1;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Win overlay */
    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 35, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .win-card {
      background: linear-gradient(145deg, #1a1a40, #232350);
      border: 2px solid #6366f1;
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 0 60px rgba(99, 102, 241, 0.3), 0 24px 64px rgba(0,0,0,0.6);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 360px;
      width: 90vw;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-title {
      font-size: 2.4rem;
      font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .win-subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .stars {
      font-size: 2.2rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .win-stats {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .win-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .win-stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 2px;
    }

    .win-stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #e2e8f0;
    }

    .win-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-primary {
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .btn-primary:hover {
      background: #818cf8;
      transform: translateY(-1px);
    }

    .btn-secondary {
      padding: 10px 24px;
      border-radius: 999px;
      border: 2px solid #2d2d5e;
      background: transparent;
      color: #94a3b8;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      border-color: #6366f1;
      color: #c7d2fe;
    }

    /* CSS confetti particles */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 99;
    }

    .confetti-piece {
      position: absolute;
      top: -10px;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-value span {
      font-size: 1rem;
      color: #6366f1;
      margin-right: 2px;
    }

    /* Board entrance: cards deal in */
    .card-outer {
      animation: dealIn 0.35s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    @keyframes dealIn {
      from { transform: scale(0.5) translateY(-20px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);     opacity: 1; }
    }

    /* Smooth transition on stat-value changes */
    .stat-value {
      transition: color 0.3s ease;
    }

    /* Pulse matched card once */
    .card-outer.matched .card-front {
      animation: matchedPulse 0.5s ease;
    }

    @keyframes matchedPulse {
      0%   { transform: rotateY(180deg) scale(1); }
      40%  { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* Highlight difficulty bar when user should pick a difficulty */
    .difficulty-bar.highlight .diff-btn:not(.active) {
      border-color: #6366f1;
      color: #c7d2fe;
      animation: diffPulse 0.6s ease 2;
    }

    @keyframes diffPulse {
      0%   { box-shadow: none; }
      50%  { box-shadow: 0 0 12px rgba(99, 102, 241, 0.5); }
      100% { box-shadow: none; }
    }

    /* Mobile: tighter padding */
    @media (max-width: 480px) {
      body { padding: 16px 8px; }
      .difficulty-bar { gap: 6px; }
      .diff-btn { padding: 6px 14px; font-size: 0.8rem; }
      .stats-bar { gap: 20px; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // Emoji pool - enough for Hard (18 pairs = 36 cards)
    const EMOJI_POOL = [
      '🦊','🐼','🦋','🌸','⚡','🎸','🍕','🚀',
      '🦄','🎯','🌈','🔮','🎃','🌙','🦁','🐉',
      '🍄','🎪'
    ];

    const DIFFICULTIES = {
      Easy:   { cols: 4, rows: 4, label: 'Easy'   },
      Medium: { cols: 5, rows: 4, label: 'Medium'  },
      Hard:   { cols: 6, rows: 6, label: 'Hard'    },
    };

    function buildDeck(cols, rows) {
      const pairs = (cols * rows) / 2;
      const emojis = EMOJI_POOL.slice(0, pairs);
      const cards = [...emojis, ...emojis].map((emoji, idx) => ({
        id: idx,
        emoji,
        flipped: false,
        matched: false,
      }));
      // Fisher-Yates shuffle
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      return cards;
    }

    function getCardSize(cols) {
      // Responsive: aim for board max ~min(90vw, 560px)
      const maxBoard = Math.min(window.innerWidth * 0.9, 560);
      const gap = 12;
      const size = Math.floor((maxBoard - gap * (cols - 1)) / cols);
      return Math.max(size, 56);
    }

    // Confetti colors
    const CONFETTI_COLORS = ['#6366f1','#a78bfa','#38bdf8','#fbbf24','#34d399','#f472b6'];

    function Confetti() {
      const pieces = Array.from({ length: 40 }, (_, i) => ({
        id: i,
        left: `${Math.random() * 100}%`,
        color: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
        duration: `${1.8 + Math.random() * 1.8}s`,
        delay: `${Math.random() * 1.2}s`,
        size: `${6 + Math.floor(Math.random() * 6)}px`,
      }));

      return (
        <div className="confetti-wrap">
          {pieces.map(p => (
            <div
              key={p.id}
              className="confetti-piece"
              style={{
                left: p.left,
                background: p.color,
                width: p.size,
                height: p.size,
                animationDuration: p.duration,
                animationDelay: p.delay,
              }}
            />
          ))}
        </div>
      );
    }

    function getStars(moves, pairs) {
      if (moves <= Math.floor(pairs * 1.5)) return 3;
      if (moves <= Math.floor(pairs * 2))   return 2;
      return 1;
    }

    function formatTime(secs) {
      const m = Math.floor(secs / 60).toString().padStart(2, '0');
      const s = (secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function App() {
      const [difficulty, setDifficulty] = useState('Easy');
      const [cards, setCards] = useState(() => buildDeck(4, 4));
      // Indices of currently face-up (non-matched) selected cards
      const [selected, setSelected] = useState([]);
      // Block clicks while checking a pair
      const [locked, setLocked] = useState(false);
      // Game stats
      const [moves, setMoves] = useState(0);
      const [elapsed, setElapsed] = useState(0);
      const [timerActive, setTimerActive] = useState(false);
      const [won, setWon] = useState(false);
      const [highlightDiff, setHighlightDiff] = useState(false);

      const { cols, rows } = DIFFICULTIES[difficulty];
      const totalPairs = (cols * rows) / 2;

      // Timer tick
      useEffect(() => {
        if (!timerActive) return;
        const id = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(id);
      }, [timerActive]);

      function resetGame(diffName) {
        const d = DIFFICULTIES[diffName];
        setCards(buildDeck(d.cols, d.rows));
        setSelected([]);
        setLocked(false);
        setMoves(0);
        setElapsed(0);
        setTimerActive(false);
        setWon(false);
      }

      function handleDifficulty(name) {
        setDifficulty(name);
        setHighlightDiff(false);
        resetGame(name);
      }

      function handleChangeDifficulty() {
        // Dismiss win screen and let user pick a difficulty from the bar
        setWon(false);
        setHighlightDiff(true);
        setTimeout(() => setHighlightDiff(false), 1500);
      }

      function handleCardClick(idx) {
        // Ignore if locked, already flipped, or already matched
        if (locked) return;
        if (cards[idx].matched) return;
        if (selected.includes(idx)) return;

        // Start timer on first flip
        if (!timerActive && !won) setTimerActive(true);

        // Flip the card
        const newCards = cards.map((c, i) =>
          i === idx ? { ...c, flipped: true } : c
        );

        if (selected.length === 0) {
          // First card of pair
          setCards(newCards);
          setSelected([idx]);
        } else {
          // Second card - this counts as one move attempt
          setLocked(true);
          setCards(newCards);
          setMoves(m => m + 1);
          const firstIdx = selected[0];

          if (newCards[firstIdx].emoji === newCards[idx].emoji) {
            // Match - mark both matched
            setTimeout(() => {
              setCards(prev => {
                const updated = prev.map((c, i) =>
                  i === firstIdx || i === idx ? { ...c, matched: true, flipped: false } : c
                );
                // Check win: all cards matched
                const matchedCount = updated.filter(c => c.matched).length;
                if (matchedCount === updated.length) {
                  setTimerActive(false);
                  setWon(true);
                }
                return updated;
              });
              setSelected([]);
              setLocked(false);
            }, 600);
          } else {
            // No match - flip both back after 800ms
            setTimeout(() => {
              setCards(prev => prev.map((c, i) =>
                i === firstIdx || i === idx ? { ...c, flipped: false } : c
              ));
              setSelected([]);
              setLocked(false);
            }, 800);
          }
        }
      }

      const cardSize = getCardSize(cols);
      const emojiSize = Math.max(Math.floor(cardSize * 0.42), 20);

      const stars = won ? getStars(moves, totalPairs) : 0;
      const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);

      return (
        <div>
          <h1>Memory Match</h1>

          {/* Difficulty selector */}
          <div className={`difficulty-bar${highlightDiff ? ' highlight' : ''}`}>
            {Object.keys(DIFFICULTIES).map(name => (
              <button
                key={name}
                className={`diff-btn${difficulty === name ? ' active' : ''}`}
                onClick={() => handleDifficulty(name)}
              >
                {name}
              </button>
            ))}
          </div>

          {/* Stats bar */}
          <div className="stats-bar">
            <div className="stat">
              <span className="stat-label">Moves</span>
              <div className="stat-value"><span>#</span>{moves}</div>
            </div>
            <div className="stat">
              <span className="stat-label">Time</span>
              <div className="stat-value"><span>&#9201;</span>{formatTime(elapsed)}</div>
            </div>
          </div>

          {/* Board */}
          <div className="board-wrap">
            <div
              className="board"
              style={{
                gridTemplateColumns: `repeat(${cols}, ${cardSize}px)`,
                gridTemplateRows: `repeat(${rows}, ${cardSize}px)`,
              }}
            >
              {cards.map((card, idx) => (
                <div
                  key={card.id}
                  className={`card-outer${card.flipped ? ' flipped' : ''}${card.matched ? ' matched' : ''}`}
                  style={{
                    width: cardSize,
                    height: cardSize,
                    '--emoji-size': `${emojiSize}px`,
                    animationDelay: `${idx * 30}ms`,
                  }}
                  onClick={() => handleCardClick(idx)}
                >
                  <div className="card-inner">
                    <div className="card-face card-back">
                      <div className="card-back-pattern" />
                    </div>
                    <div className="card-face card-front">
                      {card.emoji}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Win overlay */}
          {won && (
            <>
              <Confetti />
              <div className="win-overlay">
                <div className="win-card">
                  <div className="win-title">You Win!</div>
                  <div className="win-subtitle">All pairs matched</div>
                  <div className="stars" style={{ color: '#fbbf24' }}>{starStr}</div>
                  <div className="win-stats">
                    <div className="win-stat">
                      <span className="win-stat-label">Moves</span>
                      <span className="win-stat-value">{moves}</span>
                    </div>
                    <div className="win-stat">
                      <span className="win-stat-label">Time</span>
                      <span className="win-stat-value">{formatTime(elapsed)}</span>
                    </div>
                  </div>
                  <div className="win-btns">
                    <button className="btn-primary" onClick={() => resetGame(difficulty)}>
                      Play Again
                    </button>
                    <button className="btn-secondary" onClick={handleChangeDifficulty}>
                      Change Difficulty
                    </button>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
