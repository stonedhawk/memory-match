<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f23;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 60%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Difficulty selector */
    .difficulty-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .diff-btn {
      padding: 8px 22px;
      border-radius: 999px;
      border: 2px solid #2d2d5e;
      background: transparent;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .diff-btn:hover {
      border-color: #6366f1;
      color: #c7d2fe;
    }

    .diff-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    /* Board */
    .board-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .board {
      display: grid;
      gap: 12px;
    }

    /* Card */
    .card-outer {
      perspective: 800px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card-outer.flipped .card-inner,
    .card-outer.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Card back */
    .card-back {
      background: linear-gradient(135deg, #1e1e4a 0%, #2d2d5e 50%, #1a1a40 100%);
      border: 2px solid #3d3d7a;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .card-back-pattern {
      width: 70%;
      height: 70%;
      border-radius: 8px;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 4px,
        rgba(99, 102, 241, 0.15) 4px,
        rgba(99, 102, 241, 0.15) 8px
      );
      border: 1.5px solid rgba(99, 102, 241, 0.25);
    }

    /* Card front */
    .card-front {
      background: linear-gradient(135deg, #1a1a3e 0%, #252550 100%);
      border: 2px solid #3d3d7a;
      transform: rotateY(180deg);
      font-size: var(--emoji-size, 2rem);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .card-outer.matched .card-front {
      border-color: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.35), 0 4px 16px rgba(0,0,0,0.4);
    }

    /* Hover lift on unflipped, unmatched cards */
    .card-outer:not(.flipped):not(.matched):hover .card-inner {
      transform: translateY(-4px) scale(1.04);
    }

    .card-outer:not(.flipped):not(.matched):hover .card-back {
      border-color: #6366f1;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25), inset 0 1px 0 rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // Emoji pool - enough for Hard (18 pairs = 36 cards)
    const EMOJI_POOL = [
      '🦊','🐼','🦋','🌸','⚡','🎸','🍕','🚀',
      '🦄','🎯','🌈','🔮','🎃','🌙','🦁','🐉',
      '🍄','🎪'
    ];

    const DIFFICULTIES = {
      Easy:   { cols: 4, rows: 4, label: 'Easy'   },
      Medium: { cols: 5, rows: 4, label: 'Medium'  },
      Hard:   { cols: 6, rows: 6, label: 'Hard'    },
    };

    function buildDeck(cols, rows) {
      const pairs = (cols * rows) / 2;
      const emojis = EMOJI_POOL.slice(0, pairs);
      const cards = [...emojis, ...emojis].map((emoji, idx) => ({
        id: idx,
        emoji,
        flipped: false,
        matched: false,
      }));
      // Fisher-Yates shuffle
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      return cards;
    }

    function getCardSize(cols) {
      // Responsive: aim for board max ~min(90vw, 560px)
      const maxBoard = Math.min(window.innerWidth * 0.9, 560);
      const gap = 12;
      const size = Math.floor((maxBoard - gap * (cols - 1)) / cols);
      return Math.max(size, 56);
    }

    function App() {
      const [difficulty, setDifficulty] = useState('Easy');
      const [cards, setCards] = useState(() => buildDeck(4, 4));
      // Indices of currently face-up (non-matched) selected cards
      const [selected, setSelected] = useState([]);
      // Block clicks while checking a pair
      const [locked, setLocked] = useState(false);

      const { cols, rows } = DIFFICULTIES[difficulty];

      function handleDifficulty(name) {
        setDifficulty(name);
        const d = DIFFICULTIES[name];
        setCards(buildDeck(d.cols, d.rows));
        setSelected([]);
        setLocked(false);
      }

      function handleCardClick(idx) {
        // Ignore if locked, already flipped, or already matched
        if (locked) return;
        if (cards[idx].matched) return;
        if (selected.includes(idx)) return;
        if (selected.length === 1 && selected[0] === idx) return;

        // Flip the card
        const newCards = cards.map((c, i) =>
          i === idx ? { ...c, flipped: true } : c
        );

        if (selected.length === 0) {
          // First card
          setCards(newCards);
          setSelected([idx]);
        } else {
          // Second card - check for match
          setLocked(true);
          setCards(newCards);
          const firstIdx = selected[0];

          if (newCards[firstIdx].emoji === newCards[idx].emoji) {
            // Match! Mark both as matched
            setTimeout(() => {
              setCards(prev => prev.map((c, i) =>
                i === firstIdx || i === idx ? { ...c, matched: true, flipped: false } : c
              ));
              setSelected([]);
              setLocked(false);
            }, 600);
          } else {
            // No match - flip both back after 800ms
            setTimeout(() => {
              setCards(prev => prev.map((c, i) =>
                i === firstIdx || i === idx ? { ...c, flipped: false } : c
              ));
              setSelected([]);
              setLocked(false);
            }, 800);
          }
        }
      }

      const cardSize = getCardSize(cols);
      const emojiSize = Math.max(Math.floor(cardSize * 0.42), 20);

      return (
        <div>
          <h1>Memory Match</h1>

          {/* Difficulty selector */}
          <div className="difficulty-bar">
            {Object.keys(DIFFICULTIES).map(name => (
              <button
                key={name}
                className={`diff-btn${difficulty === name ? ' active' : ''}`}
                onClick={() => handleDifficulty(name)}
              >
                {name}
              </button>
            ))}
          </div>

          {/* Board */}
          <div className="board-wrap">
            <div
              className="board"
              style={{
                gridTemplateColumns: `repeat(${cols}, ${cardSize}px)`,
                gridTemplateRows: `repeat(${rows}, ${cardSize}px)`,
              }}
            >
              {cards.map((card, idx) => (
                <div
                  key={card.id}
                  className={`card-outer${card.flipped ? ' flipped' : ''}${card.matched ? ' matched' : ''}`}
                  style={{ width: cardSize, height: cardSize, '--emoji-size': `${emojiSize}px` }}
                  onClick={() => handleCardClick(idx)}
                >
                  <div className="card-inner">
                    <div className="card-face card-back">
                      <div className="card-back-pattern" />
                    </div>
                    <div className="card-face card-front">
                      {card.emoji}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
